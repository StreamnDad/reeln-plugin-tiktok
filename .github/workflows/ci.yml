name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create venv
        run: uv venv --python ${{ matrix.python-version }}

      - name: Install reeln-cli
        run: uv pip install "git+https://github.com/StreamnDad/reeln-cli"

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy reeln_tiktok_plugin/

      - name: Test
        run: uv run python -m pytest tests/ -n auto --cov=reeln_tiktok_plugin --cov-branch --cov-fail-under=100 -q
