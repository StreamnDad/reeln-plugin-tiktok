name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Create venv
        run: uv venv --python 3.11

      - name: Install reeln-cli
        run: uv pip install "git+https://github.com/StreamnDad/reeln-cli"

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy reeln_tiktok_plugin/

      - name: Test
        run: uv run python -m pytest tests/ -n auto --cov=reeln_tiktok_plugin --cov-branch --cov-fail-under=100 -q

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
